# Name of our pipeline - shows in GitHub UI
name: SmartLink CI/CD Pipeline

# WHEN does this run?
# Every time you push to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# WHAT does it do?
jobs:

  # JOB 1: Test the code
  test:
    name: Run Tests
    runs-on: ubuntu-latest  # GitHub gives us a free Linux machine

    steps:
      # Step 1: Download our code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install our packages
      - name: Install dependencies
        run: |
          cd link-service
          pip install flask flask-sqlalchemy redis python-dotenv pytest

      # Step 4: Run our 7 tests
      - name: Run tests
        run: |
          cd link-service
          python -m pytest tests/ -v

  # JOB 2: Build and push Docker image
  # Only runs if tests PASS
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # ← wait for test job to pass first

    # Only build on push to main (not on pull requests)
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry (free Docker registry)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./link-service
          push: true
          tags: ghcr.io/${{ github.repository }}/link-service:latest