events {
    worker_connections 1024;
}

http {

    # Rate limiting - prevent abuse
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # For SSL certificate verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        # SSL certificates (added by certbot later)
        ssl_certificate /etc/letsencrypt/live/smartlink/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smartlink/privkey.pem;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Route all traffic to our Flask app
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://link-service:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}